<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2026商精世界盃預測大賽</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="aurora">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
</div>
<div class="bg-pitch"></div>
<div class="particles" id="particles"></div>

<div class="wrap">

  <section class="hero">
    <span class="eyebrow">FIFA WORLD CUP 2026 · 美加墨</span>
    <h1 id="page-title">2026商精世界盃預測大賽</h1>
    <p class="subtitle" id="page-subtitle">四強對決・誰與爭鋒？</p>

    <div class="countdown" id="countdown">
      <div class="unit" data-unit="days"><div class="num" id="cd-days">--</div><div class="label">天</div></div>
      <div class="unit" data-unit="hours"><div class="num" id="cd-hours">--</div><div class="label">時</div></div>
      <div class="unit" data-unit="mins"><div class="num" id="cd-mins">--</div><div class="label">分</div></div>
      <div class="unit" data-unit="secs"><div class="num" id="cd-secs">--</div><div class="label">秒</div></div>
    </div>
    <div class="deadline-text">投注截止時間：<b id="deadline-label">--</b></div>
    <div class="closed-banner" id="closed-banner">⏱ 投注已截止</div>
  </section>

  <section class="stats">
    <div class="stat-card" role="button" tabindex="0" aria-label="查看全部下注總覽">
      <div class="value" id="stat-participants">--</div>
      <div class="label">參與人數</div>
    </div>
    <div class="stat-card" role="button" tabindex="0" aria-label="查看全部下注總覽">
      <div class="value" id="stat-bets">--</div>
      <div class="label">投注筆數</div>
    </div>
    <div class="stat-card" role="button" tabindex="0" aria-label="查看全部下注總覽">
      <div class="value" id="stat-total">--</div>
      <div class="label">總投注金額</div>
    </div>
  </section>

  <div class="warn-banner" id="warn-banner"></div>

  <section>
    <div class="section-title">
      <h2>四強對決</h2>
      <button class="refresh-btn" id="refresh-btn">
        <span class="spin">⟳</span> 重新整理資料
      </button>
    </div>

    <div class="chart-wrap">
      <svg id="donut-svg" class="donut-svg" viewBox="0 0 200 200">
        <defs id="donut-defs"></defs>
        <circle class="donut-track" cx="100" cy="100" r="80"></circle>
        <g id="donut-arcs" transform="rotate(-90 100 100)"></g>
      </svg>
      <div class="donut-center">
        <div class="donut-center-amount" id="donut-total">--</div>
        <div class="donut-center-label">總獎金池</div>
      </div>
    </div>

    <div class="legend" id="legend"></div>
    <div class="tap-hint center-hint">👉 點擊圖表區塊或隊伍卡片，查看下注名單</div>

    <div class="updated-text" id="updated-text"></div>
  </section>

  <footer>
    資料每 60 秒自動更新一次，或點擊上方「重新整理資料」立即取得最新結果。<br />
    投注資料由主辦人維護於 <code>data/bets.csv</code>。
  </footer>

</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="title"><span class="flag" id="modal-flag"></span><span id="modal-name"></span></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-filters" id="modal-filters">
      <label class="toggle-row" id="filter-alive-row">
        <span class="toggle-switch">
          <input type="checkbox" id="filter-alive" checked />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </span>
        <span class="toggle-label">只顯示尚未淘汰的投注</span>
      </label>
      <input type="text" id="filter-name" class="filter-input" placeholder="🔍 搜尋姓名" />
      <select id="filter-team" class="filter-select">
        <option value="">全部國家</option>
      </select>
      <select id="filter-note" class="filter-select filter-select-wide">
        <option value="">全部投注條件</option>
      </select>
    </div>
    <ul class="bettor-list" id="modal-list"></ul>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
